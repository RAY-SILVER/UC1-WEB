<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Demonstração do Bootstrap </title>

    <link rel="stylesheet" href="08_demonstracao.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container-fluid">
        <!-- MENU LATERAL -->
        <div class="row">

            <div class="col-2 menuLateral">
                <div class="text-center">
                    <img src="./img/logo.avif" width="75" class="rounded-circle mt-4" />
                    <h1> Ras System </h1>
                </div>

                <div class="list-group list-group-flush">
                    <a href="#" class="list-group-item list-group-item-action"> Início </a>
                    <a href="#" class="list-group-item list-group-item-action"> Usuários </a>
                    <a href="#" class="list-group-item list-group-item-action"> Produtos </a>
                </div>

                <div class="text-center menuLateralPerfil">
                    <img class="my-3 rounded-circle" src="./img/logo.avif" width="40" />
                    <div class="btn-group dropend">
                        <button class="btn btn-secundary dropdown-toggle" data-bs-toggle="dropdown"> Perfil </button>
                        <ul class="dropdown-menu">
                            <li> Editar </li>
                            <li> Sair </li>
                        </ul>
                    </div>


                </div>

            </div>

            <!-- CONTEÚDO PRINCIPAL -->
            <div class="col-9">
                <!-- INTRODUÇÃO -->
                <div class="mt-4">
                    <h2> Gerenciamento de usuários </h2>
                    <hr />
                </div>

                <!-- PESQUISA E FILTRO -->
                <div class="row">

                    <div class="col-8">
                        <div class="input-group mb-3">
                            <input class="form-control" placeholder="Pesquisar...">
                            <button class="btn btn-outline-secondary"> 🔎 </button>
                        </div>
                    </div>
                    <div class="col-2"> </div>
                    <div class="col-2">
                        <select class="form-select">
                            <option hidden> Filtrar... </option>
                            <option value="1"> Ativos </option>
                            <option value="2"> Inativos </option>
                        </select>
                    </div>



                </div>

                <!-- CADASTRO -->
                <div class="text-and my-5">
                    <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#exampleModal"> Novo
                    </button>
                </div>

                <!-- TABELA DE LISTAGEM -->
                <div>
                    <!-- ID, foto, nome-->
                    <div>
                        <table class="table table-striped">
                            <tr class="table-primary">
                                <td> # </td>
                                <td> ID </td>
                                <td> Nome </td>
                            </tr>
                            <tr>
                                <td> 1 </td>
                                <td> 123 </td>
                                <td> <img src="./img/logo.avif" width="25" class="rounded-circle" /> Ray </td>
                            </tr>
                            <tr>
                                <td> 2 </td>
                                <td> 456 </td>
                                <td> <img src="./img/logo.avif" width="25" class="rounded-circle" /> Ray </td>
                            </tr>

                        </table>
                    </div>
                </div>

            </div>

        </div>

        <!-- MODAL -->
        <div>

            <div class="modal fade" id="exampleModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 class="modal-title fs-5" id="exampleModalLabel"> Cadastro de novo usuário </h3>
                            <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body w-100">

                            <div class="mb-3">
                                <label class="form-label">
                                    Digite seu nome:
                                    <input class="form-control">
                                </label>
                            </div>

                            <div class="mb-3"></div>
                            <label class="form-label">
                                Digite sua senha:
                                <input type="password" class="form-control">
                            </label>
                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal"> Fechar </button>
                            <button class="btn btn-primary"> Salvar alterações </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
