<h1> Gerenciador de usuários </h1>
<p> Encontre os usuários cadastrados, crie um novo, altere ou remova. </p>
<hr/>

<h2> Cadastro </h2>

<!--------------------------------   FORMULÁRIO   -------------------------------->

<form onsubmit="salvar(event)">

    <label> 
        Digite o nome:
        <br/>
        <input class="inputNome"/>
    </label>

    <br/><br/>

    <label> 
        Digite o e-mail:
        <br/>
        <input class="inputEmail"/>
    </label>

    <br/><br/>

    <label> 
        Digite a senha:
        <br/>
        <input type="password" class="inputSenha"/>
    </label>

    <br/><br/>

    <button type="submit"> Salvar </button>
    <button type="reset"> Cancelar </button>

</form>

<hr/>

<h2> Listagens </h2>

<table border="1px" class="tabelaListagem">

    <tr>
        <td> <strong> Nome </strong></td>
        <td> <strong> E-mail </strong></td>
        <td> <strong> Senha </strong></td>
    </tr>

    <tr>
        <td></td>
        <td></td>
        <td></td>
    </tr
</table>


<!--------------------------------   SCRIPT   -------------------------------->

<script>

    function salvar(e){

        e.preventDefault()

        let nome = document.querySelector(".inputNome").value 
        let email = document.querySelector(".inputEmail").value
        let senha = document.querySelector(".inputSenha").value


        // alert(`Nome: ${nome} \nE-mail: ${email} \nSenha: ${senha}`)

        let conteudo = `
        <tr>
            <td> ${nome} </td>
            <td> ${email} </td>
            <td> ${senha} </td>
        </tr>
        `

        document.querySelector(".tabelaListagem").innerHTML += conteudo

    }

</script>
