<h1> Inputs </h1>
<p> Como criar um campo de interação com o usuário. </p>
<hr/>

<form onsubmit="salvar()"> 

    <p> Digite seu nome: </p> 
    <input minlength="3" required class="inputNome"/> 
    
    
    <p> Digite sua senha: </p> 
    <input type="password" class="inputSenha"/> 
    
    <br/><br/>
    <button> Salvar </button>
    
    <p class="enviado"> </p>
    
</form>

<script>

    function salvar(){

        let nome = document.querySelector(".inputNome").value  
        let senha = document.querySelector(".inputSenha").value 


        if (senha == "123"){
            
            alert("Seja bem-vindo(a), " + nome)

        } else {
            alert("Senha incorreta...")
        }
    }



</script>
